services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: agent-tracer-backend:latest
    env_file:
      - .env
    environment:
      AGENT_TRACER_ALLOWED_HOSTS: localhost,127.0.0.1,backend
      AGENT_TRACER_ALLOWED_ORIGINS: http://localhost:4178
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=2)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000
    image: agent-tracer-frontend:latest
    ports:
      - "4178:4178"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
